name: Deploy Production

on:
  push:
    tags:
      - 'v*-stable'
      - 'v*-prod'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v2026-06-04-stable)'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy tagged release to prod
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GHS_SSH_HOST }}
          username: ${{ secrets.GHS_SSH_USER }}
          port: ${{ secrets.GHS_SSH_PORT }}
          key: ${{ secrets.GHS_DEPLOY_KEY }}
          command_timeout: 10m
          envs: TAG
          script: |
            set -e
            export TAG="${{ steps.tag.outputs.value }}"
            sudo -n -u ghs TAG="$TAG" bash -s <<'SCRIPT'
              set -e
              cd /home/ghs/giohomestudio
              echo "[deploy-prod] fetching tag $TAG..."
              git fetch --tags origin
              git checkout "$TAG"
              echo "[deploy-prod] installing deps..."
              pnpm install --frozen-lockfile
              echo "[deploy-prod] running prisma generate..."
              pnpm prisma generate || true
              echo "[deploy-prod] restarting Next on port 3200..."
              pkill -u ghs -f "next.*-p 3200" 2>/dev/null || true
              sleep 3
              setsid bash -c 'nohup pnpm dev -p 3200 > /tmp/ghs-prod.log 2>&1 < /dev/null &'
              sleep 12
              if curl -sf -m 10 -o /dev/null http://localhost:3200/unlock; then
                echo "[deploy-prod] OK — port 3200 responding for tag $TAG"
              else
                tail -20 /tmp/ghs-prod.log || true
                exit 1
              fi
            SCRIPT
