name: Deploy Production

on:
  push:
    tags:
      - 'v*-stable'
      - 'v*-prod'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v2026-06-04-stable)'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy tagged release to prod
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GHS_SSH_HOST }}
          username: ${{ secrets.GHS_SSH_USER }}
          port: ${{ secrets.GHS_SSH_PORT }}
          key: ${{ secrets.GHS_DEPLOY_KEY }}
          command_timeout: 10m
          envs: TAG
          script: |
            set -e
            export TAG="${{ steps.tag.outputs.value }}"
            sudo -n -u ghs bash -c "
              cd /home/ghs/giohomestudio
              echo \"[deploy-prod] fetching tag $TAG...\"
              git fetch --tags origin
              git checkout \"$TAG\"
              echo \"[deploy-prod] installing deps...\"
              pnpm install --frozen-lockfile
              echo \"[deploy-prod] running prisma generate...\"
              pnpm prisma generate
              echo \"[deploy-prod] restarting Next on port 3200...\"
              pkill -f 'next.*-p 3200' || true
              sleep 2
              nohup pnpm dev -p 3200 > /tmp/ghs-prod.log 2>&1 &
              sleep 8
              curl -sf -m 10 http://localhost:3200/ > /dev/null
              echo \"[deploy-prod] DEPLOYED tag $TAG\"
            "
